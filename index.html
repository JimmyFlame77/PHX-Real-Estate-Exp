<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Area Real Estate Target Explorer & Map</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root {
            --primary-blue: #73a5d8;
            --dark-bg: #14161a;
            --text-main: #2c3e50;
            --bg-light: #eaeff2;
            --highlight-green: #2ecc71;
            --muted-gray: #94a3b8;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 25px 15px;
            color: var(--text-main);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: var(--dark-bg);
            color: #ffffff;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 6px solid var(--primary-blue);
        }
        .header-text h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header-text p {
            margin: 6px 0 0 0;
            color: #a0aab5;
            font-size: 14px;
        }
        .logo {
            height: 65px;
            object-fit: contain;
        }
        .content {
            padding: 30px;
        }
        
        /* Top Control Bar with Summary Stat */
        .dashboard-controls {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 25px;
            margin-bottom: 30px;
            padding: 25px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            align-items: center;
        }
        @media (max-width: 1000px) {
            .dashboard-controls {
                grid-template-columns: 1fr;
            }
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 12px;
            color: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
        }
        .val-display {
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95em;
            background: var(--primary-blue);
            padding: 4px 12px;
            border-radius: 6px;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--dark-bg);
            cursor: pointer;
            margin-top: -8px;
            border: 2px solid var(--primary-blue);
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        /* Summary Stat Badge */
        .match-badge {
            background: #edfcf2;
            border: 2px solid #bbf7d0;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 160px;
        }
        .match-badge .count {
            font-size: 28px;
            font-weight: 800;
            color: #15803d;
            display: block;
            line-height: 1.1;
        }
        .match-badge .label {
            font-size: 12px;
            font-weight: 600;
            color: #166534;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            display: block;
        }

        .viz-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 950px) {
            .viz-grid {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            color: #334155;
            border-left: 4px solid var(--primary-blue);
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-subtitle {
            font-size: 12px;
            font-weight: normal;
            color: #64748b;
        }
        .plot-window {
            width: 100%;
            height: 580px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-text">
            <h1>Phoenix & Surrounding Area Target Explorer</h1>
            <p>Interactive Market Analysis: Demographics & Geographic Real Estate Mapping</p>
        </div>
        <img src="logo.png" alt="Proxy Marketing & Tech Logo" class="logo">
    </div>

    <div class="content">
        <div class="dashboard-controls">
            <div class="control-group">
                <label>
                    <span>Minimum Median Income Filter</span>
                    <span id="income-val" class="val-display">$125,000</span>
                </label>
                <!-- Optimized scale up to $500,000 with 5,000 step for precision control -->
                <input type="range" id="income-slider" min="50000" max="500000" step="5000" value="125000">
            </div>
            <div class="control-group">
                <label>
                    <span>Minimum Home Value Filter</span>
                    <span id="home-val" class="val-display">$550,000</span>
                </label>
                <input type="range" id="home-slider" min="300000" max="1000000" step="10000" value="550000">
            </div>
            <div class="match-badge">
                <span id="match-count" class="count">0</span>
                <span class="label">Locations Match</span>
            </div>
        </div>

        <div class="viz-grid">
            <div class="panel">
                <div class="panel-title">
                    <span>Demographic Analytics</span>
                    <span class="panel-subtitle">Highlighted box shows perfect-match quadrant</span>
                </div>
                <div id="plot-scatter" class="plot-window"></div>
            </div>
            <div class="panel">
                <div class="panel-title">
                    <span>Geographic Target Map</span>
                    <span class="panel-subtitle">Green markers meet both threshold criteria</span>
                </div>
                <div id="plot-map" class="plot-window"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Comprehensive real estate dataset
    const data = [
        // Target Zip Codes
        { name: 'Phoenix (21131)', income: 197619, homeValue: 799900, lat: 39.5162, lon: -76.6150 },
        { name: 'Monkton (21111)', income: 136304, homeValue: 859000, lat: 39.5779, lon: -76.6144 },
        { name: 'Baldwin (21013)', income: 171354, homeValue: 649950, lat: 39.5012, lon: -76.4664 },
        { name: 'Fallston (21047)', income: 157500, homeValue: 685000, lat: 39.5276, lon: -76.4255 },
        { name: 'Glen Arm (21057)', income: 145924, homeValue: 692000, lat: 39.4446, lon: -76.4975 },
        { name: 'Lutherville-Timonium (21093)', income: 125528, homeValue: 550000, lat: 39.4398, lon: -76.6236 },
        { name: 'Sparks Glencoe (21152)', income: 121350, homeValue: 572000, lat: 39.5415, lon: -76.6386 },
        { name: 'Cockeysville (21030)', income: 89000, homeValue: 660000, lat: 39.4812, lon: -76.6439 },
        
        // Surrounding Connecting Towns & Neighborhoods
        { name: 'Jacksonville', income: 168400, homeValue: 635000, lat: 39.4815, lon: -76.5644 },
        { name: 'Sweet Air', income: 152000, homeValue: 610000, lat: 39.4970, lon: -76.5310 },
        { name: 'Hydes', income: 138000, homeValue: 595000, lat: 39.4796, lon: -76.4627 },
        { name: 'Hunt Valley', income: 115000, homeValue: 520000, lat: 39.4934, lon: -76.6561 },
        { name: 'Mays Chapel', income: 108000, homeValue: 490000, lat: 39.4562, lon: -76.6661 },
        { name: 'Kingsville', income: 124000, homeValue: 545000, lat: 39.4473, lon: -76.4130 },
        { name: 'Hampton', income: 149500, homeValue: 599000, lat: 39.4162, lon: -76.5861 },
        { name: 'Towson', income: 99500, homeValue: 460000, lat: 39.3929, lon: -76.6077 },
        { name: 'Jarrettsville', income: 120500, homeValue: 515000, lat: 39.6054, lon: -76.4786 },
        { name: 'Bel Air', income: 104000, homeValue: 435000, lat: 39.5359, lon: -76.3483 }
    ];

    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

    function updateVisuals() {
        const incomeThreshold = parseInt(document.getElementById('income-slider').value);
        const homeThreshold = parseInt(document.getElementById('home-slider').value);
        
        document.getElementById('income-val').innerText = formatCurrency(incomeThreshold);
        document.getElementById('home-val').innerText = formatCurrency(homeThreshold);

        // Filter calculation - actively applied across both components
        const matches = data.map(d => d.income >= incomeThreshold && d.homeValue >= homeThreshold);
        const matchCount = matches.filter(Boolean).length;
        document.getElementById('match-count').innerText = `${matchCount}/${data.length}`;

        const colors = matches.map(m => m ? '#2ecc71' : '#cbd5e1');
        const sizes = matches.map(m => m ? 24 : 12);
        const opacities = matches.map(m => m ? 1.0 : 0.4);
        
        const hoverLabels = data.map(d => {
            const status = (d.income >= incomeThreshold && d.homeValue >= homeThreshold) ? '<b>🟢 GOAL MATCHED</b>' : '⚪ Below Criteria';
            return `${status}<br><b>${d.name}</b><br>Median Income: ${formatCurrency(d.income)}<br>Median Home Value: ${formatCurrency(d.homeValue)}`;
        });

        // 1. SCATTER PLOT UPDATE 
        const scatterTrace = {
            x: data.map(d => d.income),
            y: data.map(d => d.homeValue),
            mode: 'markers+text',
            type: 'scatter',
            text: data.map(d => d.name),
            textposition: 'top center',
            hoverinfo: 'text',
            hovertext: hoverLabels,
            textfont: { family: 'Segoe UI, sans-serif', size: 11, color: '#334155', weight: 'bold' },
            marker: {
                size: sizes.map(s => s * 0.8),
                color: colors,
                opacity: opacities,
                line: { color: matches.map(m => m ? '#1e7e34' : '#94a3b8'), width: 2 }
            }
        };

        const xAxisMax = Math.max(incomeThreshold + 25000, 250000);

        const scatterLayout = {
            xaxis: { title: 'Median Household Income ($)', range: [40000, xAxisMax], tickformat: '$,', gridcolor: '#f1f5f9', zeroline: false },
            yaxis: { title: 'Median Home Value ($)', range: [300000, 1000000], tickformat: '$,', gridcolor: '#f1f5f9', zeroline: false },
            shapes: [
                // Highlight box shading
                {
                    type: 'rect',
                    x0: incomeThreshold,
                    y0: homeThreshold,
                    x1: xAxisMax,
                    y1: 1000000,
                    fillcolor: 'rgba(46, 204, 113, 0.06)',
                    line: { width: 0 }
                },
                // Crosshairs
                { type: 'line', x0: incomeThreshold, y0: 300000, x1: incomeThreshold, y1: 1000000, line: { color: '#e74c3c', width: 2, dash: 'dash' } },
                { type: 'line', x0: 40000, y0: homeThreshold, x1: xAxisMax, y1: homeThreshold, line: { color: '#e74c3c', width: 2, dash: 'dash' } }
            ],
            annotations: [
                { x: incomeThreshold, y: 970000, text: 'Income Threshold', showarrow: false, font: { color: '#e74c3c', size: 11, weight: 'bold' }, xanchor: 'left', bgcolor: '#ffffff', bordercolor: '#e74c3c', borderpad: 3 },
                { x: 45000, y: homeThreshold, text: 'Home Value Latitude', showarrow: false, font: { color: '#e74c3c', size: 11, weight: 'bold' }, yanchor: 'bottom', bgcolor: '#ffffff', bordercolor: '#e74c3c', borderpad: 3 }
            ],
            plot_bgcolor: '#ffffff', paper_bgcolor: '#ffffff', hovermode: 'closest',
            margin: { t: 15, b: 50, l: 70, r: 20 }, font: { family: 'Segoe UI, sans-serif' }
        };

        Plotly.react('plot-scatter', [scatterTrace], scatterLayout, {responsive: true, displayModeBar: false});

        // 2. GEOGRAPHIC MAP UPDATE
        const mapTrace = {
            type: 'scattermapbox',
            lat: data.map(d => d.lat),
            lon: data.map(d => d.lon),
            mode: 'markers+text',
            text: data.map(d => d.name.split(' ')[0]),
            textposition: 'top center',
            hoverinfo: 'text',
            hovertext: hoverLabels,
            textfont: { family: 'Segoe UI, sans-serif', size: 11, color: '#0f172a', weight: 'bold' },
            marker: {
                size: sizes,
                color: colors,
                opacity: opacities,
                line: { color: '#ffffff', width: 2 }
            }
        };

        const mapLayout = {
            mapbox: {
                style: "open-street-map",
                center: { lat: 39.49, lon: -76.53 },
                zoom: 10.2
            },
            margin: { t: 0, b: 0, l: 0, r: 0 },
            showlegend: false,
            paper_bgcolor: '#ffffff'
        };

        Plotly.react('plot-map', [mapTrace], mapLayout, {responsive: true, displayModeBar: false});
    }

    document.getElementById('income-slider').addEventListener('input', updateVisuals);
    document.getElementById('home-slider').addEventListener('input', updateVisuals);

    // Bootstrap first view
    updateVisuals();
</script>

</body>
</html>
